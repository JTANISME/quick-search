name: Remove pending-release label on close

on:
  issues:
    types: [closed]

permissions:
  issues: write

jobs:
  remove-pending-release-label:
    name: Remove pending-release label
    runs-on: ubuntu-latest
    steps:
      - name: Remove label from closed issue
        uses: actions/github-script@v7
        with:
          script: |
            const labelName = 'pending-release';
            const labels = context.payload.issue.labels ?? [];
            const hasLabel = labels.some((label) => label.name === labelName);

            if (!hasLabel) {
              core.info(`Issue #${context.issue.number} does not have ${labelName}; nothing to remove.`);
              return;
            }

            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              name: labelName,
            });
